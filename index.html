<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUFANA Smart Care Giveaway Wheel</title>
  <style>
    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --primary:#0f172a;
      --secondary:#1d4ed8;
      --danger:#ef4444;
      --shadow:0 14px 36px rgba(0,0,0,.12);
      --radius:18px;
      --wheel-size:min(88vw,560px);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    body[dir="rtl"]{direction:rtl}
    .app{
      max-width:1280px;
      margin:0 auto;
      padding:20px;
      display:grid;
      grid-template-columns:1fr 390px;
      gap:20px;
      min-height:100vh;
    }
    .panel{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .wheel-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }
    .title-row{
      width:100%;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .title-row h1{
      margin:0 0 6px;
      font-size:24px;
    }
    .subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }
    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .pointer{
      width:0;height:0;
      border-left:18px solid transparent;
      border-right:18px solid transparent;
      border-top:32px solid var(--danger);
      margin-bottom:-8px;
      z-index:3;
      filter:drop-shadow(0 3px 4px rgba(0,0,0,.22));
    }
    .canvas-wrap{
      width:var(--wheel-size);
      height:var(--wheel-size);
      position:relative;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      border-radius:50%;
      background:#fff;
      box-shadow:0 20px 50px rgba(0,0,0,.22);
    }
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      width:100%;
    }
    button,.fake-upload{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      min-height:44px;
    }
    .primary{background:var(--primary);color:#fff}
    .secondary{background:#e5e7eb;color:var(--text)}
    .danger{background:#fee2e2;color:#991b1b}
    .sidebar{display:flex;flex-direction:column;gap:16px}
    .card-title{margin:0 0 12px;font-size:20px}
    .winner-box,.stats-box,.settings-box{
      padding:14px;
      border-radius:14px;
      background:#f8fafc;
      border:1px solid #e5e7eb;
    }
    .winner-box img{
      width:100%;
      max-height:220px;
      object-fit:cover;
      border-radius:12px;
      margin-top:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.14);
    }
    .tip-box{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:#eff6ff;
      border:1px solid #bfdbfe;
      color:#1e3a8a;
      font-size:14px;
      line-height:1.5;
    }
    .settings{display:grid;gap:12px}
    .setting{display:grid;gap:6px}
    .setting label{font-size:13px;color:var(--muted);font-weight:700}
    .setting .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .setting input[type="range"]{width:100%}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{
      padding:12px;border-radius:12px;background:#fff;border:1px solid #e5e7eb;text-align:center
    }
    .stat .value{font-size:22px;font-weight:700}
    .stat .label{font-size:12px;color:var(--muted);margin-top:4px}
    .list{display:grid;gap:10px;max-height:420px;overflow:auto;padding-right:4px}
    .item{
      display:grid;
      grid-template-columns:58px 1fr;
      gap:12px;
      align-items:center;
      padding:8px;
      border-radius:12px;
      background:#f9fafb;
      border:1px solid #e5e7eb;
    }
    .item img{
      width:58px;height:58px;object-fit:cover;border-radius:10px;background:#ddd
    }
    .item .name{font-size:14px;font-weight:700}
    .item .meta{font-size:12px;color:var(--muted);word-break:break-word;margin-top:3px}
    .badge{
      display:inline-block;
      margin-top:5px;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      background:#dcfce7;
      color:#166534;
    }
    .popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:10000;
      padding:18px;
    }
    .popup.active{display:flex}
    .popup-card{
      width:min(92vw,420px);
      background:#fff;
      border-radius:20px;
      padding:20px;
      box-shadow:0 24px 50px rgba(0,0,0,.28);
      text-align:center;
    }
    .popup-card img{
      width:100%;
      max-height:240px;
      object-fit:cover;
      border-radius:14px;
      margin:14px 0;
    }
    .popup-title{font-size:24px;font-weight:700;margin:0}
    .popup-subtitle{color:var(--muted);font-size:14px;margin-top:6px}
    .popup-tip{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:#eff6ff;
      color:#1e3a8a;
      font-size:14px;
      line-height:1.5;
    }
    @media (max-width:980px){
      .app{grid-template-columns:1fr}
      .list{max-height:none}
    }
  </style>
</head>
<body lang="en" dir="ltr">
  <div class="app">
    <div class="panel wheel-panel">
      <div class="title-row">
        <div>
          <h1 id="appTitle">SUFANA Smart Care Giveaway Wheel</h1>
          <div class="subtitle" id="appSubtitle">Spin the wheel, choose a winner automatically, and reveal a health tip with every result.</div>
        </div>
        <div class="top-actions">
          <button id="langBtn" class="secondary">AR</button>
        </div>
      </div>

      <div class="pointer"></div>

      <div class="canvas-wrap">
        <canvas id="wheel" width="560" height="560"></canvas>
      </div>

      <div class="controls">
        <button id="spinBtn" class="primary">Spin Wheel</button>
        <button id="redrawBtn" class="secondary">Redraw</button>
        <button id="resetWinnersBtn" class="secondary">Reset Winners</button>
        <button id="resetStatsBtn" class="danger">Reset Stats</button>
        <button id="uploadBtn" class="secondary">Upload Disabled</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <h2 class="card-title" id="winnerCardTitle">Winner</h2>
        <div class="winner-box">
          <div id="winnerText"><strong>Winner:</strong> None yet</div>
          <img id="winnerImage" alt="Winner preview" style="display:none;" />
          <div class="tip-box" id="winnerTipBox" style="display:none;">
            <strong id="tipLabel">Health Tip:</strong>
            <div id="winnerTip" style="margin-top:6px;"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2 class="card-title" id="statsCardTitle">Tracking</h2>
        <div class="stats-box">
          <div class="stats-grid">
            <div class="stat">
              <div class="value" id="spinCount">0</div>
              <div class="label" id="spinCountLabel">Total Spins</div>
            </div>
            <div class="stat">
              <div class="value" id="clickCount">0</div>
              <div class="label" id="clickCountLabel">Page Opens</div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2 class="card-title" id="settingsCardTitle">Settings</h2>
        <div class="settings-box">
          <div class="settings">
            <div class="setting">
              <label for="spinDuration" id="spinDurationLabel">Spin duration</label>
              <div class="row">
                <input id="spinDuration" type="range" min="2" max="8" step="0.5" value="4.5" />
                <span id="spinDurationValue">4.5s</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2 class="card-title" id="imagesCardTitle">Wheel Items</h2>
        <div class="list" id="imageList"></div>
      </div>
    </div>
  </div>

  <div class="popup" id="winnerPopup">
    <div class="popup-card">
      <h3 class="popup-title" id="popupTitle">Winner</h3>
      <div class="popup-subtitle" id="popupSubtitle">Congratulations</div>
      <img id="popupImg" alt="Winner image" />
      <div id="popupText" style="font-size:18px;font-weight:700;"></div>
      <div class="popup-tip">
        <strong id="popupTipLabel">Health Tip</strong>
        <div id="popupTip" style="margin-top:6px;"></div>
      </div>
      <div style="margin-top:16px;">
        <button id="closePopupBtn" class="primary">Close</button>
      </div>
    </div>
  </div>

  <script>
    const translations = {

        spinWheel: "ابدأ الدوران",

        spinCountLabel: "إجمالي الدوران",
        clickCountLabel: "مرات فتح الصفحة",
        settingsCardTitle: "الإعدادات",
        spinDurationLabel: "مدة الدوران",
        imagesCardTitle: "عناصر العجلة",
        alreadyWon: "فاز سابقًا",
        popupTitle: "الفائز",
        popupSubtitle: "تهانينا",
        popupTipLabel: "نصيحة صحية",
        close: "إغلاق",
        spinning: "جارٍ الدوران...",
        allWinnersUsed: "كل العناصر فازت مسبقًا. أعِد تعيين الفائزين لتدور مرة أخرى.",
        winnersReset: "تمت إعادة تعيين الفائزين.",
        statsReset: "تمت إعادة تعيين بيانات التتبع."
      }
    };

    let currentLang = localStorage.getItem("sufana_lang") || "en";

    function cryptoRandomId() {
      return "id-" + Math.random().toString(36).slice(2, 10);
    }

    const defaultItems = [
      ["Quiet Luxury","فخامة هادئة","./Photo/1.jpg","True luxury is a calm mind and a healthy heart.","الفخامة الحقيقية هي راحة البال وصحة القلب."],
      ["Health Value","قيمة الصحة","./Photo/2.jpg","Your health is the most valuable thing you own—treat it that way.","صحتك هي أغلى ما تملك — عاملها كذلك."],
      ["Moment of Care","لحظة عناية","./Photo/3.jpg","A quiet moment of care can change everything.","لحظة هادئة من العناية قد تغير كل شيء."],
      ["Elegant Care","أناقة العناية","./Photo/4.jpg","Elegance begins with taking care of yourself.","الأناقة تبدأ من العناية بنفسك."],
      ["Future Self","مستقبلك الصحي","./Photo/5.jpg","Your future self is built by today’s small choices.","مستقبلك الصحي يُبنى باختياراتك الصغيرة اليوم."],
      ["Peace of Mind","راحة البال","./Photo/6.jpg","Peace of mind starts with knowing your numbers.","راحة البال تبدأ بمعرفة قراءاتك."],
      ["Wellness Lifestyle","أسلوب العافية","./Photo/7.jpg","Wellness is not a trend—it’s a lifestyle.","العافية ليست موضة — بل أسلوب حياة."],
      ["Balanced Life","حياة متوازنة","./Photo/8.jpg","A balanced life is the ultimate form of success.","الحياة المتوازنة هي أعلى درجات النجاح."],
      ["You Matter","أنت مهم","./Photo/9.jpg","Take care of yourself—no one can replace you.","اعتنِ بنفسك — لا أحد يمكنه أن يحل مكانك."],
      ["Silent Luxury","الفخامة الصامتة","./Photo/10.jpg","Health is the silent luxury behind every beautiful life.","الصحة هي الفخامة الصامتة خلف كل حياة جميلة."],
      ["Softness","اللطف والهدوء","./Photo/11.jpg","Slow down. Your heart deserves softness.","اهدأ… قلبك يستحق اللطف."],
      ["Refined Habit","عادة راقية","./Photo/12.jpg","Caring for yourself is the most refined habit.","العناية بنفسك هي أرقى عادة."],
      ["Healthy Identity","هوية صحية","./Photo/13.jpg","Your routine is your identity—make it healthy.","روتينك هو هويتك — اجعله صحيًا."],
      ["Luxury Control","ترف التحكم","./Photo/14.jpg","Luxury is having control over your wellbeing.","الفخامة هي أن تتحكم في صحتك."],
      ["Calm Heart","قلب هادئ","./Photo/15.jpg","A calm heart creates a powerful life.","القلب الهادئ يصنع حياة قوية."],
      ["Listen Early","استمع مبكرًا","./Photo/16.jpg","Your body whispers before it speaks—listen early.","جسمك يهمس قبل أن يصرخ — استمع مبكرًا."],
      ["Essential Care","العناية الضرورية","./Photo/17.jpg","Taking care is not extra—it’s essential.","العناية ليست رفاهية — بل ضرورة."],
      ["Soft Habits","عادات لطيفة","./Photo/18.jpg","Soft habits, strong results.","عادات بسيطة… نتائج قوية."],
      ["Invest in Health","استثمر في صحتك","./Photo/19.jpg","Invest in your health—it always pays back.","استثمر في صحتك — العائد مضمون."],
      ["True Signature","توقيعك الحقيقي","./Photo/20.jpg","Your wellbeing is your true signature.","صحتك هي توقيعك الحقيقي."],
      ["Healthy Rhythm","إيقاع صحي","./Photo/21.jpg","A healthy rhythm creates a beautiful life.","الإيقاع الصحي يصنع حياة جميلة."],
      ["Care Today","اعتنِ اليوم","./Photo/22.jpg","Care today. Shine tomorrow.","اعتنِ اليوم… لتتألق غدًا."],
      ["Deserve Better","تستحق الأفضل","./Photo/23.jpg","You deserve a life that feels as good as it looks.","تستحق حياة تشعر بجمالها كما تراها."],
      ["Calm Choices","اختيارات هادئة","./Photo/24.jpg","Calm choices build powerful futures.","الاختيارات الهادئة تبني مستقبلًا قويًا."],
      ["New Luxury","الفخامة الجديدة","./Photo/25.jpg","Health is the new luxury—and it’s yours.","الصحة هي الفخامة الجديدة — وهي لك."],
      ["Beautiful Habit","أجمل عادة","./Photo/26.jpg","The most beautiful habit is self-care.","أجمل عادة هي العناية بالنفس."],
      ["Elegant Journey","رحلة أنيقة","./Photo/27.jpg","Your health journey deserves elegance.","رحلتك الصحية تستحق الأناقة."],
      ["Strong Hearts","قلوب قوية","./Photo/28.jpg","Strong hearts are built quietly, daily.","القلوب القوية تُبنى بهدوء… يومًا بعد يوم."],
      ["Priority","الأولوية","./Photo/29.jpg","Make your wellbeing your priority, not your option.","اجعل صحتك أولوية لا خيارًا."],
      ["Peaceful Life","حياة هادئة","./Photo/30.jpg","A peaceful life begins with a healthy heart.","الحياة الهادئة تبدأ بقلب صحي."]
    ].map(([label_en,label_ar,image,tip_en,tip_ar]) => ({
      id: cryptoRandomId(), label_en, label_ar, image, tip_en, tip_ar, winner:false
    }));

    let items = JSON.parse(localStorage.getItem("sufana_wheel_items") || "null") || defaultItems;
    window.items = items;

    let loadedImages = [];
    let currentRotation = 0;
    let spinning = false;

    const statsKey = "sufana_wheel_stats";
    const stats = JSON.parse(localStorage.getItem(statsKey) || "null") || {
      pageOpens: 0,
      totalSpins: 0,
      history: []
    };
    stats.pageOpens += 1;
    saveStats();

    const fallbackColors = ["#0f172a","#1e293b","#334155","#1d4ed8","#2563eb","#3b82f6","#60a5fa","#93c5fd"];

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");

    const spinBtn = document.getElementById("spinBtn");
    const redrawBtn = document.getElementById("redrawBtn");
    const resetWinnersBtn = document.getElementById("resetWinnersBtn");
    const resetStatsBtn = document.getElementById("resetStatsBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const langBtn = document.getElementById("langBtn");

    const winnerText = document.getElementById("winnerText");
    const winnerImage = document.getElementById("winnerImage");
    const winnerTipBox = document.getElementById("winnerTipBox");
    const winnerTip = document.getElementById("winnerTip");
    const imageList = document.getElementById("imageList");

    const spinDurationSlider = document.getElementById("spinDuration");
    const spinDurationValue = document.getElementById("spinDurationValue");

    const spinCount = document.getElementById("spinCount");
    const clickCount = document.getElementById("clickCount");

    const winnerPopup = document.getElementById("winnerPopup");
    const popupTitle = document.getElementById("popupTitle");
    const popupSubtitle = document.getElementById("popupSubtitle");
    const popupImg = document.getElementById("popupImg");
    const popupText = document.getElementById("popupText");
    const popupTip = document.getElementById("popupTip");
    const closePopupBtn = document.getElementById("closePopupBtn");

    const logo = new Image();
    logo.src =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#9ec0d8"/>
              <stop offset="100%" stop-color="#5b87a8"/>
            </linearGradient>
          </defs>
          <circle cx="80" cy="80" r="78" fill="white"/>
          <text x="80" y="76" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="url(#g)">SUFANA</text>
          <line x1="40" y1="88" x2="120" y2="88" stroke="url(#g)" stroke-width="2"/>
          <text x="80" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="url(#g)">Smart Care</text>
        </svg>
      `);

    function t(key){ return translations[currentLang][key]; }
    function getItemLabel(item){ return currentLang === "ar" ? item.label_ar : item.label_en; }
    function getItemTip(item){ return currentLang === "ar" ? item.tip_ar : item.tip_en; }

    function saveItems(){ localStorage.setItem("sufana_wheel_items", JSON.stringify(items)); }
    function saveStats(){ localStorage.setItem(statsKey, JSON.stringify(stats)); }

    function updateTexts(){
      document.documentElement.lang = currentLang;
      document.body.setAttribute("lang", currentLang);
      document.body.setAttribute("dir", currentLang === "ar" ? "rtl" : "ltr");

      document.getElementById("appTitle").textContent = t("appTitle");
      document.getElementById("appSubtitle").textContent = t("appSubtitle");
      spinBtn.textContent = t("spinWheel");
      redrawBtn.textContent = t("redraw");
      resetWinnersBtn.textContent = t("resetWinners");
      resetStatsBtn.textContent = t("resetStats");
      uploadBtn.textContent = t("uploadDisabled");

      document.getElementById("winnerCardTitle").textContent = t("winnerCardTitle");
      document.getElementById("tipLabel").textContent = t("tipLabel");

      document.getElementById("statsCardTitle").textContent = t("statsCardTitle");
      document.getElementById("spinCountLabel").textContent = t("spinCountLabel");
      document.getElementById("clickCountLabel").textContent = t("clickCountLabel");

      document.getElementById("settingsCardTitle").textContent = t("settingsCardTitle");
      document.getElementById("spinDurationLabel").textContent = t("spinDurationLabel");
      document.getElementById("imagesCardTitle").textContent = t("imagesCardTitle");

      popupTitle.textContent = t("popupTitle");
      popupSubtitle.textContent = t("popupSubtitle");
      document.getElementById("popupTipLabel").textContent = t("popupTipLabel");
      closePopupBtn.textContent = t("close");

      langBtn.textContent = currentLang === "en" ? "AR" : "EN";

      updateWinnerPanelTexts();
      createImageList();
      updateStatsUI();
      updateDurationLabel();
    }

    function updateWinnerPanelTexts(){
      const currentWinnerId = winnerText.dataset.winnerId;
      if (!currentWinnerId) {
        winnerText.innerHTML = `<strong>${t("winner")}:</strong> ${t("noneYet")}`;
        winnerTipBox.style.display = "none";
        return;
      }
      const item = items.find(x => x.id === currentWinnerId);
      if (!item) return;
      winnerText.innerHTML = `<strong>${t("winner")}:</strong> ${getItemLabel(item)}`;
      winnerTip.textContent = getItemTip(item);
      winnerTipBox.style.display = "block";
    }

    function updateStatsUI(){
      spinCount.textContent = stats.totalSpins;
      clickCount.textContent = stats.pageOpens;
    }

    function updateDurationLabel(){
      spinDurationValue.textContent = currentLang === "ar"
        ? `${spinDurationSlider.value} ث`
        : `${spinDurationSlider.value}s`;
    }
    spinDurationSlider.addEventListener("input", updateDurationLabel);

    function createImageList(){
      imageList.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";
        row.innerHTML = `
          <img src="${item.image}" alt="${getItemLabel(item)}">
          <div>
            <div class="name">${getItemLabel(item)}</div>
            <div class="meta">${item.image}</div>
            ${item.winner ? `<span class="badge">${t("alreadyWon")}</span>` : ""}
          </div>
        `;
        imageList.appendChild(row);
      });
    }

    function loadImages(){
      return Promise.all(
        items.map((item) => new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ ok:true, img });
          img.onerror = () => {
            console.log("FAILED:", item.image, new URL(item.image, location.href).href);
            resolve({ ok:false, img:null });
          };
          img.src = item.image;
        }))
      );
    }

    function drawWheel(rotation = currentRotation){
      const size = canvas.width;
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size * 0.46;
      const sliceAngle = (2 * Math.PI) / items.length;

      ctx.clearRect(0, 0, size, size);

      for (let i = 0; i < items.length; i++) {
        const start = rotation + i * sliceAngle - Math.PI / 2;
        const end = start + sliceAngle;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = fallbackColors[i % fallbackColors.length];
        ctx.fill();

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        ctx.clip();

        const loaded = loadedImages[i];
        if (loaded && loaded.ok && loaded.img) {
          const img = loaded.img;

          const temp = document.createElement("canvas");
          temp.width = 220;
          temp.height = 220;
          const tctx = temp.getContext("2d");

          const side = Math.min(img.width, img.height);
          const sx = (img.width - side) / 2;
          const sy = (img.height - side) / 2;
          tctx.drawImage(img, sx, sy, side, side, 0, 0, 220, 220);

          ctx.translate(centerX, centerY);
          ctx.rotate(start + sliceAngle / 2);
          ctx.drawImage(temp, radius * 0.18, -42, 84, 84);
          ctx.resetTransform();
        }

        ctx.restore();

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = items[i].winner ? "rgba(255,255,255,0.28)" : "rgba(255,255,255,0.08)";
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.stroke();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(start + sliceAngle / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#111827";
        ctx.strokeStyle = "rgba(255,255,255,0.96)";
        ctx.lineWidth = 4;
        ctx.font = "bold 12px Arial";
        const label = String(i + 1);
        ctx.strokeText(label, radius * 0.72, 0);
        ctx.fillText(label, radius * 0.72, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(centerX, centerY, size * 0.09, 0, 2 * Math.PI);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.lineWidth = 5;
      ctx.strokeStyle = "#111827";
      ctx.stroke();

      if (logo.complete) {
        const logoSize = size * 0.12;
        ctx.drawImage(logo, centerX - logoSize / 2, centerY - logoSize / 2, logoSize, logoSize);
      }
    }

    function getWheelIndexForItem(itemId){
      return items.findIndex(item => item.id === itemId);
    }

    function computeTargetRotationForIndex(index){
      const sliceAngle = (2 * Math.PI) / items.length;
      const centerAngle = index * sliceAngle + sliceAngle / 2;
      const pointerAngle = 3 * Math.PI / 2;
      return pointerAngle - centerAngle;
    }

    function normalizeRotation(angle){
      return ((angle % (2 * Math.PI)) + (2 * Math.PI)) % (2 * Math.PI);
    }

    function chooseAvailableWinner(){
      const available = items.filter(item => !item.winner);
      if (!available.length) return null;
      return available[Math.floor(Math.random() * available.length)];
    }

    function showWinner(item){
      winnerText.dataset.winnerId = item.id;
      winnerText.innerHTML = `<strong>${t("winner")}:</strong> ${getItemLabel(item)}`;
      winnerImage.src = item.image;
      winnerImage.style.display = "block";
      winnerTip.textContent = getItemTip(item);
      winnerTipBox.style.display = "block";

      popupTitle.textContent = t("popupTitle");
      popupSubtitle.textContent = t("popupSubtitle");
      popupImg.src = item.image;
      popupText.textContent = getItemLabel(item);
      popupTip.textContent = getItemTip(item);
      winnerPopup.classList.add("active");
    }

    function closePopup(){
      winnerPopup.classList.remove("active");
    }

    function spinWheel(){
      if (spinning || items.length < 2) return;

      const chosen = chooseAvailableWinner();
      if (!chosen) {
        alert(t("allWinnersUsed"));
        return;
      }

      const winnerIndex = getWheelIndexForItem(chosen.id);
      if (winnerIndex < 0) return;

      spinning = true;
      spinBtn.disabled = true;
      winnerText.innerHTML = `<strong>${t("winner")}:</strong> ${t("spinning")}`;
      winnerImage.style.display = "none";
      winnerTipBox.style.display = "none";

      const duration = parseFloat(spinDurationSlider.value) * 1000;
      const extraTurns = 6 + Math.random() * 3;
      const baseTarget = computeTargetRotationForIndex(winnerIndex);
      const currentNorm = normalizeRotation(currentRotation);
      let delta = baseTarget - currentNorm;
      if (delta < 0) delta += 2 * Math.PI;

      const targetRotation = currentRotation + extraTurns * 2 * Math.PI + delta;
      const initialRotation = currentRotation;
      const startTime = performance.now();

      function animate(now){
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 4);

        currentRotation = initialRotation + (targetRotation - initialRotation) * eased;
        drawWheel(currentRotation);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          chosen.winner = true;
          saveItems();

          stats.totalSpins += 1;
          stats.history.push({
            id: chosen.id,
            label_en: chosen.label_en,
            label_ar: chosen.label_ar,
            timestamp: new Date().toISOString()
          });
          saveStats();
          updateStatsUI();

          createImageList();
          drawWheel(currentRotation);
          showWinner(chosen);

          spinning = false;
          spinBtn.disabled = false;
        }
      }

      requestAnimationFrame(animate);
    }

    async function reloadAndDraw(){
      loadedImages = await loadImages();
      console.log("LoadedImages:", loadedImages);
      drawWheel();
    }

    document.getElementById("uploadBtn").addEventListener("click", () => {
      alert("Upload is disabled in live site. Use images from Photo folder.");
    });

    spinBtn.addEventListener("click", spinWheel);
    redrawBtn.addEventListener("click", () => drawWheel(currentRotation));

    resetWinnersBtn.addEventListener("click", async () => {
      items = items.map(item => ({ ...item, winner:false }));
      window.items = items;
      saveItems();
      await reloadAndDraw();
      alert(t("winnersReset"));
    });

    resetStatsBtn.addEventListener("click", () => {
      stats.totalSpins = 0;
      stats.pageOpens = 0;
      stats.history = [];
      saveStats();
      updateStatsUI();
      alert(t("statsReset"));
    });

    closePopupBtn.addEventListener("click", closePopup);
    winnerPopup.addEventListener("click", (event) => {
      if (event.target === winnerPopup) closePopup();
    });

    langBtn.addEventListener("click", () => {
      currentLang = currentLang === "en" ? "ar" : "en";
      updateTexts();
      drawWheel(currentRotation);
    });

    async function init(){
      updateTexts();
      await reloadAndDraw();
    }

    init();
  </script>
</body>
</html>
