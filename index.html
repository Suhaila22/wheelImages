<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUFANA Smart Care Giveaway Wheel</title>
  <style>
    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --primary:#0f172a;
      --secondary:#1d4ed8;
      --danger:#ef4444;
      --shadow:0 14px 36px rgba(0,0,0,.12);
      --radius:18px;
      --wheel-size:min(88vw,580px);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    body[dir="rtl"]{direction:rtl}
    .app{max-width:1280px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 390px;gap:20px;min-height:100vh}
    .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .wheel-panel{display:flex;flex-direction:column;align-items:center;gap:14px}
    .title-row{width:100%;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .title-row h1{margin:0 0 6px;font-size:24px}
    .subtitle{color:var(--muted);font-size:14px;line-height:1.5}
    .pointer{
      width:0;height:0;
      border-left:20px solid transparent;
      border-right:20px solid transparent;
      border-top:35px solid var(--danger);
      margin-bottom:-10px;
      z-index:10;
      filter:drop-shadow(0 3px 4px rgba(0,0,0,.3));
    }
    .canvas-wrap{width:var(--wheel-size);height:var(--wheel-size);position:relative}
    canvas{width:100%;height:100%;display:block;border-radius:50%;background:#fff;box-shadow:0 20px 50px rgba(0,0,0,.25)}
    .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
    button{border:none;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px}
    .primary{background:var(--primary);color:#fff}
    .secondary{background:#e5e7eb;color:var(--text)}
    .danger{background:#fee2e2;color:#991b1b}
    .sidebar{display:flex;flex-direction:column;gap:16px}
    .card-title{margin:0 0 12px;font-size:20px}
    .winner-box{padding:14px;border-radius:14px;background:#f8fafc;border:1px solid #e5e7eb;text-align:center}
    .winner-box img{width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-top:12px;box-shadow:0 8px 24px rgba(0,0,0,.14)}
    .list{display:grid;gap:10px;max-height:450px;overflow:auto;padding-right:4px}
    .item{display:grid;grid-template-columns:58px 1fr;gap:12px;align-items:center;padding:8px;border-radius:12px;background:#f9fafb;border:1px solid #e5e7eb}
    .item img{width:58px;height:58px;object-fit:cover;border-radius:10px;background:#ddd}
    .badge{display:inline-block;margin-top:5px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;background:#dcfce7;color:#166534}
    .popup{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:10000;padding:18px}
    .popup.active{display:flex}
    .popup-card{width:min(92vw,420px);background:#fff;border-radius:20px;padding:25px;text-align:center}
    .popup-card img{width:100%;max-height:240px;object-fit:cover;border-radius:14px;margin:15px 0}
    @media (max-width:980px){.app{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <div class="panel wheel-panel">
      <div class="title-row">
        <div>
          <h1 id="appTitle">SUFANA Smart Care Giveaway Wheel</h1>
          <div class="subtitle" id="appSubtitle">Spin the wheel to choose a winner.</div>
        </div>
        <button id="langBtn" class="secondary">AR</button>
      </div>

      <div class="pointer"></div>
      <div class="canvas-wrap">
        <canvas id="wheel" width="600" height="600"></canvas>
      </div>

      <div class="controls">
        <button id="spinBtn" class="primary">Spin Wheel</button>
        <button id="resetWinnersBtn" class="secondary">Reset Winners</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <h2 class="card-title" id="winnerCardTitle">Winner</h2>
        <div class="winner-box">
          <div id="winnerText"><strong>Winner:</strong> None yet</div>
          <img id="winnerImage" style="display:none;" />
        </div>
      </div>
      <div class="panel">
        <h2 class="card-title" id="imagesCardTitle">Wheel Items</h2>
        <div class="list" id="imageList"></div>
      </div>
    </div>
  </div>

  <div class="popup" id="winnerPopup">
    <div class="popup-card">
      <h2 id="popupTitle">Winner!</h2>
      <img id="popupImg" />
      <div id="popupText" style="font-size:20px; font-weight:bold;"></div>
      <button id="closePopupBtn" class="primary" style="margin-top:20px; width:100%">Close</button>
    </div>
  </div>

  <script>
    const translations = {
      en: { spin: "Spin Wheel", reset: "Reset Winners", winner: "Winner", none: "None yet", items: "Wheel Items", title: "Winner!" },
      ar: { spin: "ابدأ الدوران", reset: "إعادة تعيين", winner: "الفائز", none: "لا يوجد بعد", items: "العناصر", title: "الفائز!" }
    };

    let currentLang = "en";
    const itemCount = 30;
    let items = JSON.parse(localStorage.getItem("sufana_items")) || Array.from({ length: itemCount }, (_, i) => ({
      id: i,
      image: `./Photo/${i + 1}.jpg`,
      winner: false
    }));

    let loadedImages = [];
    let currentRotation = 0;
    let spinning = false;

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");

    async function loadAllImages() {
      const promises = items.map(item => new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ ok: true, img });
        img.onerror = () => resolve({ ok: false, img: null });
        img.src = item.image;
      }));
      loadedImages = await Promise.all(promises);
    }

    function drawWheel(rotation = currentRotation) {
      const size = canvas.width;
      const cx = size / 2;
      const cy = size / 2;
      const radius = size * 0.48;
      const slice = (Math.PI * 2) / items.length;

      ctx.clearRect(0, 0, size, size);

      items.forEach((item, i) => {
        const start = rotation + i * slice - Math.PI / 2;
        const end = start + slice;

        ctx.save();
        // 1. Create Clip for Slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.clip();

        // 2. Draw Background Image
        const loaded = loadedImages[i];
        if (loaded && loaded.ok) {
          ctx.translate(cx, cy);
          ctx.rotate(start + slice / 2 + Math.PI / 2);
          // Scale image to fill the slice
          const imgW = radius * 1.5;
          const imgH = radius * 1.2;
          ctx.drawImage(loaded.img, -imgW / 2, -radius, imgW, imgH);
          ctx.rotate(-(start + slice / 2 + Math.PI / 2));
          ctx.translate(-cx, -cy);
        } else {
          ctx.fillStyle = i % 2 === 0 ? "#1e293b" : "#334155";
          ctx.fill();
        }

        // 3. Darken if already won
        if (item.winner) {
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.fill();
        }
        ctx.restore();

        // 4. Border
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 1;
        ctx.stroke();

        // 5. Numbers
        const angle = start + slice / 2;
        const lx = cx + Math.cos(angle) * (radius * 0.85);
        const ly = cy + Math.sin(angle) * (radius * 0.85);

        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(angle + Math.PI / 2);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.textAlign = "center";
        ctx.shadowBlur = 4;
        ctx.shadowColor = "black";
        ctx.fillText(i + 1, 0, 0);
        ctx.restore();
      });

      // Center Piece
      ctx.beginPath();
      ctx.arc(cx, cy, 55, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();
      ctx.strokeStyle = "#0f172a";
      ctx.lineWidth = 5;
      ctx.stroke();

      ctx.fillStyle = "#0f172a";
      ctx.textAlign = "center";
      ctx.font = "bold 13px Arial";
      ctx.fillText("SUFANA", cx, cy - 3);
      ctx.font = "10px Arial";
      ctx.fillText("Smart Care", cx, cy + 12);
    }

    function spin() {
      if (spinning) return;
      const available = items.filter(v => !v.winner);
      if (available.length === 0) return alert("All prizes won!");

      const winner = available[Math.floor(Math.random() * available.length)];
      const winnerIndex = items.indexOf(winner);
      
      spinning = true;
      const duration = 5000;
      const rotations = 7;
      const sliceSize = (Math.PI * 2) / items.length;
      const targetAngle = (Math.PI * 1.5) - (winnerIndex * sliceSize + sliceSize / 2);
      const initialRotation = currentRotation % (Math.PI * 2);
      const finalRotation = initialRotation + (rotations * Math.PI * 2) + (targetAngle - initialRotation);

      const start = performance.now();
      function animate(time) {
        const elapsed = time - start;
        const t = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - t, 4);
        currentRotation = initialRotation + (finalRotation - initialRotation) * ease;
        drawWheel();

        if (t < 1) requestAnimationFrame(animate);
        else {
          spinning = false;
          winner.winner = true;
          localStorage.setItem("sufana_items", JSON.stringify(items));
          showResult(winner);
          renderList();
        }
      }
      requestAnimationFrame(animate);
    }

    function showResult(item) {
      document.getElementById("winnerText").innerHTML = `<strong>Winner:</strong> Item ${item.id + 1}`;
      document.getElementById("winnerImage").src = item.image;
      document.getElementById("winnerImage").style.display = "block";
      document.getElementById("popupImg").src = item.image;
      document.getElementById("popupText").innerText = `Item ${item.id + 1}`;
      document.getElementById("winnerPopup").classList.add("active");
    }

    function renderList() {
      const container = document.getElementById("imageList");
      container.innerHTML = items.map(item => `
        <div class="item">
          <img src="${item.image}">
          <div>
            <strong>Item ${item.id + 1}</strong>
            ${item.winner ? '<br><span class="badge">Won</span>' : ''}
          </div>
        </div>
      `).join('');
    }

    document.getElementById("spinBtn").onclick = spin;
    document.getElementById("closePopupBtn").onclick = () => document.getElementById("winnerPopup").classList.remove("active");
    document.getElementById("resetWinnersBtn").onclick = () => {
      items.forEach(i => i.winner = false);
      localStorage.removeItem("sufana_items");
      renderList();
      drawWheel();
    };

    async function init() {
      await loadAllImages();
      renderList();
      drawWheel();
    }

    init();
  </script>
</body>
</html>
